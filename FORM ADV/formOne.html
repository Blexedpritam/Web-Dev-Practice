<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <fieldset>
            <legend>Event Registration</legend>

            <label for="text">Enter Text :</label>
            <input type="text" id="text" name="text">
            <br>
            <br>

            <label for="Emailid">Enter Email :</label>
            <input type="email" id="Emailid" name="Emailid">
            <br>
            <br>

            <label for="phonenumber">Enter Phone number :</label>
            <input type="tel" id="phonenumber" name="phonenumber">
            <br>
            <br>
            <label for="occuption">Occuptions :</label>
            <select name="occuption" id="selector1">
                <option value="student">student</option>
                <option value="professional">professional</option>
                <option value="others">others</option>
            </select>
            <br>
            <br>
            <label for="checkbox">Topic of Intrests :</label>
            <br>
            <br>
            <label for="checkbox1">HTML</label>
            <input type="checkbox" id="checkbox1" name="checkbox1">
            <br>
            <br>
            <label for="checkbox2">CSS</label>
            <input type="checkbox" id="checkbox2" name="checkbox2">
            <br>
            <br>
            <label for="checkbox3">JAVA SCRIPT</label>
            <input type="checkbox" id="checkbox3" name="checkbox3">
            <br>
            <br>
            <label for="textarea1">Comments :</label>
            <textarea name="textarea1" id="textarea1" cols="30" rows="10" placeholder="enter commnets.."></textarea>

            <input type="submit" value="Registers">



        </fieldset>
        
    </form>
</body>
</html>
