<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Job Application</h2>
    <form>
        <label for="text">Name :</label>
            <input type="text" id="text" name="text">
            <br>
            <br>

            <label for="Emailid">Enter Email :</label>
            <input type="email" id="Emailid" name="Emailid">
            <br>
            <br>

            <label for="phonenumber">Phone number :</label>
            <input type="tel" id="phonenumber" name="phonenumber">
            <br>
            <br>
       <label for="file1">Resume :</label>
       <br>
       <br>
       <input type="file" name="file1" id="file1">
       <br>
       <label for="experience">Experience (years :)</label>
       <br>
       <br>
       <input type="number" name="counter" id="experience" min="0" max="40">
       <br>
       <br>
       <fieldset>
        <legend>Skills :</legend>
            
            <label for="checkbox1">HTML</label>
            <input type="checkbox" id="checkbox1" name="checkbox1">
            <br>
            <br>
            <label for="checkbox2">CSS</label>
            <input type="checkbox" id="checkbox2" name="checkbox2">
            <br>
            <br>
            <label for="checkbox3">JAVA SCRIPT</label>
            <input type="checkbox" id="checkbox3" name="checkbox3">
            <br>
            <br>
       </fieldset>
       <label for="highesteducation1">Highest Education :</label>
       <br>
       <br>
       <select name="highesteducation" id="highesteducation1">
            <option value="highschool">High School</option>
            <option value="college">college</option>
            <option value="university">university</option>
       </select>
       <br>
       <br>

      <fieldset>
        <legend>Avalablitity</legend>

        <label for="radio1">Full Time:</label>
        <input type="radio" name="Gender" id="radio1">
        <br>
        <br>     
        <label for="radio2">Part Time :</label>
        <input type="radio" name="Gender" id="radio2"> 
      </fieldset>

      <br>
      <br>
      <label for="textarea1">Additional Comments  :</label>
      <textarea name="texarea" id="textarea1" cols="30" rows="10" placeholder="Enter comments..."></textarea>
      <input type="submit" value="Submit Application">
             

    </form>


</body>
</html>
